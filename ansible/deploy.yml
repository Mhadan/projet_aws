- name: Configure EC2 for E-commerce App
  hosts: web
  become: true
 
  tasks:
 
    - name: Update system
      yum:
        name: "*"
        state: latest
 
    - name: Install Docker
      yum:
        name: docker
        state: present
 
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
 
    - name: Install Docker Compose
      shell: |
        curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
 
    - name: Create app directory
      file:
        path: /app
        state: directory
 
    - name: Create docker-compose.yml
      copy:
        dest: /app/docker-compose.yml
        content: |
          version: '3'
          services:
            mongodb:
              image: mongo:4.4
              container_name: mongodb
              restart: always
              environment:
                MONGO_INITDB_DATABASE: ecommerce
 
            app:
              image: node:14
              container_name: nodeapp
              working_dir: /app
              volumes:
                - ./app:/app
              command: sh -c "npm install && node server.js"
              ports:
                - "3000:3000"
              depends_on:
                - mongodb
              environment:
                MONGO_URL: mongodb://mongodb:27017/ecommerce
 
            nginx:
              image: nginx:latest
              container_name: nginx
              ports:
                - "80:80"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf
              depends_on:
                - app
 
    - name: Create Node.js app directory
      file:
        path: /app/app
        state: directory
 
    - name: Create package.json
      copy:
        dest: /app/app/package.json
        content: |
          {
            "name": "ecommerce",
            "version": "1.0.0",
            "dependencies": {
              "express": "^4.18.2",
              "mongoose": "^7.0.0"
            }
          }
 
    - name: Create server.js
      copy:
        dest: /app/app/server.js
        content: |
          const express = require('express');
          const mongoose = require('mongoose');
          const app = express();
 
          mongoose.connect(process.env.MONGO_URL);
 
          const Product = mongoose.model('Product', {
            name: String,
            price: Number
          });
 
          app.get('/', async (req, res) => {
            const products = await Product.find();
            let html = '<h1>E-Commerce Store</h1><ul>';
            products.forEach(p => {
              html += '<li>' + p.name + ' - $' + p.price + '</li>';
            });
            html += '</ul>';
            res.send(html);
          });
 
          app.listen(3000, async () => {
            await Product.create([
              { name: 'Laptop', price: 1200 },
              { name: 'Phone', price: 800 }
            ]);
            console.log('Server running on port 3000');
          });
 
    - name: Create Nginx config
      copy:
        dest: /app/nginx.conf
        content: |
          server {
            listen 80;
            location / {
              proxy_pass http://app:3000;
            }
          }
 
    - name: Stop existing containers
      shell: docker stop ecommerce nginx mongodb nodeapp 2>/dev/null || true
 
    - name: Remove existing containers
      shell: docker rm ecommerce nginx mongodb nodeapp 2>/dev/null || true
 
    - name: Start all containers
      shell: cd /app && docker-compose up -d